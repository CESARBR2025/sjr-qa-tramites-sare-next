- name: Push to QA repo
  env:
    QA_TOKEN: ${{ secrets.TEST_QA }}
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"

    git remote add qa https://x-access-token:${QA_TOKEN}@github.com/CESARBR2025/sjr-qa-tramites-sare-next.git

    git ls-remote https://x-access-token:${QA_TOKEN}@github.com/CESARBR2025/sjr-qa-tramites-sare-next.git

    git push qa main --force
